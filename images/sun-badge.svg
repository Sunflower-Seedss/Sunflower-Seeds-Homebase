<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sng" x1="100" y1="27" x2="100" y2="183" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fff9b0"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <filter id="snglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g fill="url(#sng)" filter="url(#snglow)" transform="translate(100,105)">
    <!-- Centre circle -->
    <circle cx="0" cy="0" r="38"/>
    <!-- Rays — varying length, slightly irregular angles for organic feel -->
    <rect x="-5" y="-75" width="10" height="30" rx="5" transform="rotate(0)"/>
    <rect x="-4" y="-72" width="8" height="22" rx="4" transform="rotate(24)"/>
    <rect x="-5" y="-78" width="10" height="28" rx="5" transform="rotate(48)"/>
    <rect x="-4" y="-68" width="8" height="20" rx="4" transform="rotate(70)"/>
    <rect x="-5" y="-74" width="10" height="28" rx="5" transform="rotate(92)"/>
    <rect x="-4" y="-70" width="8" height="22" rx="4" transform="rotate(115)"/>
    <rect x="-5" y="-76" width="10" height="28" rx="5" transform="rotate(138)"/>
    <rect x="-4" y="-66" width="8" height="20" rx="4" transform="rotate(160)"/>
    <rect x="-5" y="-73" width="10" height="26" rx="5" transform="rotate(183)"/>
    <rect x="-4" y="-69" width="8" height="22" rx="4" transform="rotate(205)"/>
    <rect x="-5" y="-75" width="10" height="28" rx="5" transform="rotate(228)"/>
    <rect x="-4" y="-67" width="8" height="20" rx="4" transform="rotate(250)"/>
    <rect x="-5" y="-74" width="10" height="28" rx="5" transform="rotate(272)"/>
    <rect x="-4" y="-71" width="8" height="22" rx="4" transform="rotate(295)"/>
